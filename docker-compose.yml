services:
  jpg6:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: jpg6-downloader:dev
    container_name: jpg6_dev
    volumes:
      # Live code reload during development
      - .:/app
      # Persist downloads and config outside the container
      - ./downloads:/app/downloads
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
    # Override CMD to drop into shell for interactive development
    command: ["python", "-c", "print('jpg6-downloader dev container ready')"]
    stdin_open: true
    tty: true
